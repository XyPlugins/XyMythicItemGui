# 插件设置
# 聊天消息前缀请在 Message.yml 的 prefix 中修改。
plugins:
  prefix: "&7[&6XyGui&7]"

# 点击领取数量（0 表示禁用该点击方式）
click-amounts:
  left: 1
  right: 1
  middle: 1
  shift_left: 10
  shift_right: 10

# 物品排序设置
sort:
  enabled: true
  by: "display"                # display: 按显示名, internal: 按内部名
  order: "asc"                 # asc: 升序, desc: 降序
  mob:
    enabled: true
    by: "display"              # display: 按显示名, internal: 按内部名
    order: "asc"               # asc: 升序, desc: 降序

# GUI 设置
gui:
  menu-title: "&6&lXyGui 总菜单"
  title: "&6&l物品展示"
  mob-title: "&6&l怪物图鉴"
  size: 54
  items-per-page: 28
  border:
    material: "STAINED_GLASS_PANE"
    data: 7
    name: " "
  item-display:
    show-lore: true

# MythicMobs 物品自动更新系统
# 这里开启的是扫描系统；单个 MM 物品仍必须在物品配置中写 XyUpdate.Enabled: true 才会被更新。
item-update:
  enabled: true
  scan-on-join: true            # 玩家进服后延迟扫描
  scan-after-reload: true       # /xygui reload 或 /mm reload 后扫描在线玩家
  join-delay-ticks: 60          # 进服后延迟 3 秒扫描，避免和其他插件抢数据
  players-per-tick: 1           # 每次队列只处理几个玩家，建议大服保持 1
  queue-interval-ticks: 1       # 队列处理间隔
  notify-player: true           # 玩家物品被更新时是否提示

# 搜索设置
search:
  by-display-name: true
  by-internal-name: true
  by-lore: false

search-timeout-seconds: 30
